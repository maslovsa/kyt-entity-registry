name: Nightly logo enrichment

# Daily at 02:00 UTC. Budget 500 refresh attempts per run; spread across
# tier-1 (importance ≥ 90, refreshed first) and stale tier-2/3.
on:
  # schedule:
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      max:
        description: "Max entities to process (default 500)"
        required: false
      category:
        description: "Restrict to one category_slug (e.g. exchanges)"
        required: false
      dry-run:
        description: "Set to 'true' to skip writes + commit"
        required: false

permissions:
  contents: write    # enrich.py commits updated entities.csv + logos

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v5

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2  # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run enrichment
        id: enrich
        env:
          # Public CDN client ID; safe to inline but secret-wired so it
          # can rotate without a commit.
          BRANDFETCH_CLIENT_ID: ${{ secrets.BRANDFETCH_CLIENT_ID }}
          INPUT_MAX: ${{ github.event.inputs.max }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry-run }}
        run: |
          ARGS="--max ${INPUT_MAX:-500}"
          [ -n "$INPUT_CATEGORY" ] && ARGS="$ARGS --category $INPUT_CATEGORY"
          [ "$INPUT_DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          python scripts/enrich.py $ARGS

      - name: Commit updates
        if: steps.enrich.outcome == 'success' && github.event.inputs.dry-run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entities.csv logos/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            DATE=$(date -u +%Y-%m-%d)
            STATS=$(git diff --staged --numstat logos/ | wc -l | tr -d ' ')
            git commit -m "enrich: ${STATS} logo(s) updated (${DATE})"
            git push
          fi

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_AUDIT: ${{ secrets.TELEGRAM_CHAT_AUDIT }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_AUDIT" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              -d "chat_id=$TELEGRAM_CHAT_AUDIT" \
              -d "parse_mode=Markdown" \
              -d "text=💥 *kyt-entity-registry enrichment failed* — [run →](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          fi
