name: refresh-dn-snapshot

# Fetches the current vasp_entities.display_name map from the aegis-platform
# Supabase project and opens a PR bumping dn_snapshot.json. Keeps the
# validator's expectations in sync with what the UI actually resolves.
#
# Requires repo secrets:
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF
#
# The secrets are read ONLY by refresh_dn_snapshot.py; they're never exposed
# to the manifest generator or validator. If you don't wire them, the
# workflow simply won't run — everything else in the repo keeps working.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v5

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install httpx

      - name: Refresh dn_snapshot.json
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 scripts/refresh_dn_snapshot.py

      - name: Open PR if snapshot changed
        uses: peter-evans/create-pull-request@6d6857d36972b65feb161a90e484f2984215f83e  # v6
        with:
          commit-message: "chore: refresh dn_snapshot.json"
          title: "chore: weekly refresh of dn_snapshot.json"
          body: |
            Automated snapshot of `vasp_entities.display_name` from aegis-platform Supabase.

            Merge to keep the validator in sync with runtime expectations.
          branch: chore/refresh-dn-snapshot
          delete-branch: true
